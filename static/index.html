<!DOCTYPE html>
<html lang="en" x-data="goalcastApp()" x-init="init()" :class="darkMode ? 'dark' : ''">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        apple: { blue: '#007AFF', dark: '#1D1D1F', gray: '#6E6E73', border: '#E5E7EB', bg: '#F5F5F7' },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        .collapse-body { overflow: hidden; transition: max-height .3s ease, opacity .25s ease; }
        .collapse-body.collapsed { max-height: 0 !important; opacity: 0; }
        .toast { animation: toastIn .3s ease, toastOut .3s ease 1.7s forwards; }
        @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
    </style>
</head>
<body class="bg-white dark:bg-[#0f1623] text-apple-dark dark:text-gray-200 min-h-screen antialiased">

    <!-- Toast notification -->
    <div x-show="toast" x-transition class="fixed top-20 left-1/2 -translate-x-1/2 z-[100]">
        <div class="toast bg-apple-dark dark:bg-white text-white dark:text-apple-dark text-sm font-semibold px-5 py-2.5 rounded-full shadow-lg" x-text="toast"></div>
    </div>

    <!-- Refresh progress overlay -->
    <div x-show="refreshing" x-transition.opacity class="fixed inset-0 z-[200] bg-white/95 dark:bg-[#0f1623]/95 backdrop-blur-sm flex items-center justify-center">
        <div class="w-80 text-center">
            <div class="w-10 h-10 mx-auto mb-6 rounded-xl bg-apple-blue flex items-center justify-center text-white font-bold text-lg">G</div>
            <div class="w-full h-1.5 bg-gray-100 dark:bg-white/10 rounded-full overflow-hidden mb-4">
                <div class="h-full bg-apple-blue rounded-full transition-all duration-700 ease-out" :style="'width:' + refreshPct + '%'"></div>
            </div>
            <p class="text-sm text-apple-gray" x-text="refreshStage"></p>
            <p class="text-xs text-gray-300 dark:text-gray-600 mt-2 tabular-nums" x-text="Math.round(refreshPct) + '%'"></p>
        </div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 dark:bg-[#151d2e]/90 backdrop-blur-xl border-b border-apple-border dark:border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-apple-blue flex items-center justify-center text-white font-bold text-sm">G</div>
                <span class="text-lg font-bold tracking-tight dark:text-white">GoalCast</span>
            </div>
            <div class="flex items-center gap-2">
                <button @click="toggleTheme()" class="w-8 h-8 rounded-lg bg-apple-bg dark:bg-white/10 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-white/15 transition">
                    <template x-if="!darkMode"><svg class="w-4 h-4 text-apple-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg></template>
                    <template x-if="darkMode"><svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></template>
                </button>
                <button @click="saveAll()" class="h-8 px-3 rounded-lg bg-apple-blue/10 hover:bg-apple-blue/20 text-apple-blue text-xs font-semibold flex items-center gap-1.5 transition">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                    Save All
                </button>
                <button @click="doRefresh()" :disabled="loading" class="h-8 px-3 rounded-lg bg-apple-blue hover:bg-blue-600 text-white text-xs font-semibold flex items-center gap-1.5 transition disabled:opacity-40">
                    <svg class="w-3.5 h-3.5" :class="loading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Refresh
                </button>
                <!-- User auth -->
                <template x-if="currentUser">
                    <div class="flex items-center gap-2 ml-1 relative" x-data="{ menuOpen: false }">
                        <button @click="menuOpen = !menuOpen" class="flex items-center gap-1.5">
                            <img :src="currentUser.picture" class="w-7 h-7 rounded-full border border-apple-border" referrerpolicy="no-referrer">
                        </button>
                        <div x-show="menuOpen" @click.outside="menuOpen = false" class="absolute top-10 right-0 bg-white dark:bg-[#1a2234] border border-apple-border dark:border-white/10 rounded-xl shadow-lg py-1 w-48 z-50">
                            <div class="px-3 py-2 border-b border-gray-100 dark:border-white/5">
                                <p class="text-xs font-semibold text-apple-dark dark:text-white truncate" x-text="currentUser.name"></p>
                                <p class="text-[10px] text-apple-gray truncate" x-text="currentUser.email"></p>
                            </div>
                            <template x-if="currentUser.role === 'admin'">
                                <a href="/admin" class="block px-3 py-2 text-xs text-apple-blue font-medium hover:bg-apple-bg dark:hover:bg-white/5 transition">Admin panel</a>
                            </template>
                            <a href="/auth/logout" class="block px-3 py-2 text-xs text-apple-gray hover:text-[#EF4444] hover:bg-apple-bg dark:hover:bg-white/5 transition">Sign out</a>
                        </div>
                    </div>
                </template>
                <template x-if="!currentUser">
                    <a href="/auth/login" :class="signInPulse ? 'ring-2 ring-apple-blue bg-apple-blue/10 scale-105' : ''" class="h-8 px-3 rounded-lg border border-apple-border dark:border-white/10 text-xs font-medium text-apple-dark dark:text-gray-300 flex items-center gap-1.5 hover:bg-apple-bg dark:hover:bg-white/5 transition" id="signInBtn">Sign in</a>
                </template>
            </div>
        </div>
    </header>

    <!-- Sticky tabs + filters wrapper -->
    <div class="sticky top-14 z-40 bg-white/95 dark:bg-[#0f1623]/95 backdrop-blur-md border-b border-apple-border/50 dark:border-white/5 pb-3">
    <!-- Tabs -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-4 flex items-center gap-2">
        <button @click="activeTab = 'matches'" :class="activeTab === 'matches' ? 'bg-apple-blue text-white' : 'text-apple-gray hover:text-apple-dark dark:hover:text-white'" class="px-5 py-1.5 rounded-full text-sm font-semibold transition-all">Matches</button>
        <button @click="activeTab = 'history'" :class="activeTab === 'history' ? 'bg-apple-blue text-white' : 'text-apple-gray hover:text-apple-dark dark:hover:text-white'" class="px-5 py-1.5 rounded-full text-sm font-semibold transition-all">History</button>
        <span class="ml-auto text-xs text-apple-gray" x-show="!loading" x-text="activeTab === 'history' ? historyStats.total + ' finished' : matchesTabData.length + '/' + allMatches.length + ' matches'"></span>
    </div>

    <!-- Filter bar -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 mt-2 flex items-center gap-2 flex-wrap" x-show="allMatches.length > 0">
        <!-- Competitions dropdown -->
        <div class="relative" x-data="{ open: false }" @click.outside="open = false">
            <button @click="open = !open" class="h-8 px-3 rounded-lg border border-apple-border dark:border-white/10 bg-white dark:bg-[#1a2234] text-xs font-medium text-apple-dark dark:text-gray-300 flex items-center gap-1.5 hover:border-apple-blue/30 transition">
                <span x-text="isFilterActive('leagues') ? 'Competitions (' + filterLeagues.length + ')' : 'Competitions: All'"></span>
                <svg class="w-3 h-3 text-apple-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="open" x-transition class="absolute top-10 left-0 z-40 bg-white dark:bg-[#1a2234] border border-apple-border dark:border-white/10 rounded-xl shadow-lg p-2 w-52 max-h-60 overflow-y-auto">
                <div class="flex gap-3 px-2 py-1 mb-1">
                    <button @click="filterLeagues = [...availableLeagues]" class="text-[10px] font-semibold text-apple-blue hover:underline">Select All</button>
                    <button @click="filterLeagues = []" class="text-[10px] font-semibold text-apple-blue hover:underline">Clear</button>
                </div>
                <template x-for="lg in availableLeagues" :key="lg">
                    <label class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-apple-bg dark:hover:bg-white/5 cursor-pointer">
                        <input type="checkbox" :value="lg" x-model="filterLeagues" class="rounded border-gray-300 text-apple-blue focus:ring-apple-blue/30 w-3.5 h-3.5">
                        <span class="text-xs text-apple-dark dark:text-gray-300" x-text="lg"></span>
                    </label>
                </template>
            </div>
        </div>

        <!-- Teams dropdown -->
        <div class="relative" x-data="{ open: false, search: '' }" @click.outside="open = false">
            <button @click="open = !open" class="h-8 px-3 rounded-lg border border-apple-border dark:border-white/10 bg-white dark:bg-[#1a2234] text-xs font-medium text-apple-dark dark:text-gray-300 flex items-center gap-1.5 hover:border-apple-blue/30 transition">
                <span x-text="isFilterActive('teams') ? 'Teams (' + filterTeams.length + ')' : 'Teams: All'"></span>
                <svg class="w-3 h-3 text-apple-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="open" x-transition class="absolute top-10 left-0 z-40 bg-white dark:bg-[#1a2234] border border-apple-border dark:border-white/10 rounded-xl shadow-lg p-2 w-56 max-h-64 overflow-y-auto">
                <div class="flex gap-3 px-2 py-1 mb-1">
                    <button @click="filterTeams = [...availableTeams]" class="text-[10px] font-semibold text-apple-blue hover:underline">Select All</button>
                    <button @click="filterTeams = []" class="text-[10px] font-semibold text-apple-blue hover:underline">Clear</button>
                </div>
                <input type="text" x-model="search" placeholder="Search teams..." class="w-full px-2 py-1.5 mb-1 text-xs border border-apple-border dark:border-white/10 rounded-lg bg-apple-bg dark:bg-white/5 text-apple-dark dark:text-white focus:outline-none focus:border-apple-blue placeholder-apple-gray">
                <template x-for="tm in availableTeams.filter(t => !search || t.toLowerCase().includes(search.toLowerCase()))" :key="tm">
                    <label class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-apple-bg dark:hover:bg-white/5 cursor-pointer">
                        <input type="checkbox" :value="tm" x-model="filterTeams" class="rounded border-gray-300 text-apple-blue focus:ring-apple-blue/30 w-3.5 h-3.5">
                        <span class="text-xs text-apple-dark dark:text-gray-300" x-text="tm"></span>
                    </label>
                </template>
            </div>
        </div>

        <!-- Date range (History tab only) -->
        <template x-if="activeTab === 'history'">
            <div class="flex items-center gap-2">
                <span class="text-xs text-apple-gray font-medium">From</span>
                <input type="date" x-model="historyDateStart" :style="darkMode ? 'color-scheme:dark' : 'color-scheme:light'" class="h-8 px-2 rounded-lg border border-apple-border dark:border-white/10 bg-white dark:bg-[#1a2234] text-xs text-apple-dark dark:text-gray-300 focus:outline-none focus:border-apple-blue transition">
                <span class="text-xs text-apple-gray font-medium">to</span>
                <input type="date" x-model="historyDateEnd" :style="darkMode ? 'color-scheme:dark' : 'color-scheme:light'" class="h-8 px-2 rounded-lg border border-apple-border dark:border-white/10 bg-white dark:bg-[#1a2234] text-xs text-apple-dark dark:text-gray-300 focus:outline-none focus:border-apple-blue transition">
            </div>
        </template>

        <!-- My predictions toggle (History + logged in only) -->
        <button x-show="activeTab === 'history' && currentUser"
                @click="myPredictionsOnly = !myPredictionsOnly"
                :class="myPredictionsOnly ? 'bg-apple-blue text-white' : 'text-apple-gray hover:text-apple-dark dark:hover:text-white'"
                class="px-5 py-1.5 rounded-full text-sm font-semibold transition-all">My predictions</button>

        <!-- Clear filters -->
        <button x-show="hasActiveFilters" @click="clearFilters()" class="text-[11px] text-apple-blue hover:underline">Clear filters</button>

        <!-- Export CSV (History + logged in, pushed right) -->
        <button x-show="activeTab === 'history' && currentUser"
                @click="exportCSV()"
                class="ml-auto h-8 px-3 rounded-lg border border-apple-border dark:border-white/10 bg-white dark:bg-[#1a2234] text-xs font-medium text-apple-dark dark:text-gray-300 flex items-center gap-1.5 hover:border-apple-blue/30 transition">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export CSV
        </button>
    </div>
    </div><!-- end sticky wrapper -->

    <!-- Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

        <!-- Loading -->
        <div x-show="loading" class="flex flex-col items-center py-20">
            <div class="w-10 h-10 border-[3px] border-apple-blue border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-sm text-apple-gray">Loading matches...</p>
        </div>

        <!-- Error -->
        <div x-show="error" class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 rounded-xl px-5 py-3 text-sm mb-4" x-text="error"></div>

        <!-- Matches Tab -->
        <div x-show="activeTab === 'matches' && !loading" class="space-y-6">
            <template x-for="dateGroup in groupedData.slice(0, _visibleGroups)" :key="dateGroup.date">
                <div :id="'date-' + dateGroup.date">
                    <!-- Date header -->
                    <div class="flex items-center gap-3 mb-3">
                        <button @click="dateGroup.open = !dateGroup.open" class="flex items-center gap-3 group cursor-pointer flex-1 min-w-0">
                            <div class="w-[3px] h-7 rounded-full shrink-0" :class="isToday(dateGroup.date) ? 'bg-apple-blue' : 'bg-gray-200 dark:bg-gray-700'"></div>
                            <h2 class="text-sm font-bold tracking-wide" :class="isToday(dateGroup.date) ? 'text-apple-blue' : 'text-apple-dark dark:text-gray-300'" x-text="formatDateHeader(dateGroup.date)"></h2>
                            <span class="text-[10px] font-medium text-apple-gray" x-text="dateGroup.matchCount + ' matches'"></span>
                            <template x-if="isFuture(dateGroup.date)">
                                <span class="text-[10px] font-medium text-apple-blue">upcoming</span>
                            </template>
                            <svg class="w-4 h-4 text-gray-300 dark:text-gray-600 ml-auto transition-transform" :class="dateGroup.open || '-rotate-90'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <button @click.stop="copyAllAIForDate(dateGroup)" class="text-[10px] font-semibold text-apple-blue hover:text-blue-600 transition shrink-0 px-2 py-1 rounded hover:bg-apple-blue/5" title="Copy all AI predictions for this date">Copy All AI</button>
                    </div>

                    <div x-show="isToday(dateGroup.date)" class="h-px bg-apple-blue/20 mb-3"></div>

                    <!-- Leagues -->
                    <div class="collapse-body space-y-3" :class="dateGroup.open || 'collapsed'" :style="dateGroup.open ? 'max-height:9999px;opacity:1' : ''">
                        <template x-for="leagueGroup in dateGroup.leagues" :key="leagueGroup.league">
                            <div class="bg-white dark:bg-[#1a2234] rounded-xl overflow-hidden border border-apple-border dark:border-white/5">
                                <button @click="leagueGroup.open = !leagueGroup.open" class="w-full flex items-center gap-2.5 px-4 py-2.5 hover:bg-apple-bg/50 dark:hover:bg-white/[0.03] transition cursor-pointer">
                                    <span class="w-2 h-2 rounded-full shrink-0" :style="'background:' + leagueColor(leagueGroup.league)"></span>
                                    <span class="text-xs font-bold uppercase tracking-wider text-apple-gray" x-text="leagueGroup.league"></span>
                                    <span class="text-[10px] text-gray-400" x-text="leagueGroup.matches.length"></span>
                                    <svg class="w-3 h-3 text-gray-300 ml-auto transition-transform" :class="leagueGroup.open || '-rotate-90'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                </button>

                                <div x-show="leagueGroup.open" class="collapse-body" :class="leagueGroup.open || 'collapsed'" :style="leagueGroup.open ? 'max-height:9999px;opacity:1' : ''">
                                    <template x-for="item in leagueGroup.matches" :key="item.match.api_match_id || getMatchKey(item.match)">
                                        <div class="border-t border-gray-100 dark:border-white/[0.04] hover:bg-apple-bg/30 dark:hover:bg-white/[0.015] transition-colors"
                                             :class="getResultBorderClass(item)">
                                            <div class="px-4 py-3">
                                                <div class="flex items-center gap-3">

                                                    <!-- Time -->
                                                    <div class="w-11 shrink-0 text-xs text-apple-gray font-medium tabular-nums" x-text="formatTime(item.match.match_date)"></div>

                                                    <!-- Home team -->
                                                    <div class="w-[150px] shrink-0 text-right">
                                                        <div class="text-[13px] font-semibold text-apple-dark dark:text-gray-100 leading-tight" x-text="item.match.home_team"></div>
                                                        <div class="text-[10px] text-apple-gray tabular-nums" x-text="item.match.home_elo?.toFixed(0)" title="Elo rating (ClubElo)"></div>
                                                    </div>

                                                    <!-- Probability bar -->
                                                    <div class="flex-1 min-w-[130px] max-w-[220px]">
                                                        <div class="flex h-7 rounded-lg overflow-hidden text-[10px] font-bold leading-none">
                                                            <div class="bg-[#86EFAC] text-gray-800 flex items-center justify-center" :style="'width:' + Math.max(item.prediction.home_win_prob * 100, 14) + '%'" x-text="(item.prediction.home_win_prob * 100).toFixed(0) + '%'"></div>
                                                            <div class="bg-[#FDE68A] text-gray-700 flex items-center justify-center" :style="'width:' + Math.max(item.prediction.draw_prob * 100, 14) + '%'" x-text="(item.prediction.draw_prob * 100).toFixed(0) + '%'"></div>
                                                            <div class="bg-[#FCA5A5] text-gray-800 flex items-center justify-center" :style="'width:' + Math.max(item.prediction.away_win_prob * 100, 14) + '%'" x-text="(item.prediction.away_win_prob * 100).toFixed(0) + '%'"></div>
                                                        </div>
                                                    </div>

                                                    <!-- Away team -->
                                                    <div class="w-[150px] shrink-0">
                                                        <div class="text-[13px] font-semibold text-apple-dark dark:text-gray-100 leading-tight" x-text="item.match.away_team"></div>
                                                        <div class="text-[10px] text-apple-gray tabular-nums" x-text="item.match.away_elo?.toFixed(0)" title="Elo rating (ClubElo)"></div>
                                                    </div>

                                                    <!-- AI prediction -->
                                                    <div class="w-16 shrink-0 flex flex-col items-center gap-0.5">
                                                        <div class="text-[13px] font-bold tabular-nums text-apple-dark dark:text-white">
                                                            <span x-text="item.prediction.predicted_home_goals"></span>
                                                            <span class="text-gray-300 dark:text-gray-600 mx-px">-</span>
                                                            <span x-text="item.prediction.predicted_away_goals"></span>
                                                        </div>
                                                        <div class="relative w-10 h-1 rounded-full overflow-hidden" style="background:linear-gradient(to right,#EF4444,#F59E0B,#22C55E)">
                                                            <div class="absolute top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-apple-dark dark:bg-white border border-white dark:border-gray-800"
                                                                 :style="'left:' + Math.max(0, Math.min(100, ((item.prediction.confidence_pct || 30) - 20) / 60 * 100)) + '%'"></div>
                                                        </div>
                                                    </div>

                                                    <!-- My prediction -->
                                                    <div class="w-[130px] shrink-0 flex items-center justify-center" x-data="{ justSaved: false }">
                                                        <!-- Saved/locked state -->
                                                        <template x-if="isSaved(item.match)">
                                                            <div class="flex items-center gap-1.5">
                                                                <span class="text-sm font-bold tabular-nums text-apple-dark dark:text-white" x-text="userPredictions[getMatchKey(item.match)].home + ' - ' + userPredictions[getMatchKey(item.match)].away"></span>
                                                                <button @click="deletePrediction(item.match)" class="text-gray-300 hover:text-[#EF4444] transition" title="Delete prediction">
                                                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                                                </button>
                                                            </div>
                                                        </template>
                                                        <!-- Editable state -->
                                                        <template x-if="!isSaved(item.match)">
                                                            <div class="flex items-center gap-1">
                                                                <input type="number" min="0" max="9" placeholder="-"
                                                                    class="w-8 h-8 text-center text-sm font-bold rounded-lg border border-apple-border dark:border-white/10 bg-transparent dark:text-white focus:outline-none focus:border-apple-blue focus:ring-1 focus:ring-apple-blue/30 transition"
                                                                    x-model.number="userPredictions[getMatchKey(item.match)].home">
                                                                <span class="text-gray-300 text-xs">-</span>
                                                                <input type="number" min="0" max="9" placeholder="-"
                                                                    class="w-8 h-8 text-center text-sm font-bold rounded-lg border border-apple-border dark:border-white/10 bg-transparent dark:text-white focus:outline-none focus:border-apple-blue focus:ring-1 focus:ring-apple-blue/30 transition"
                                                                    x-model.number="userPredictions[getMatchKey(item.match)].away">
                                                                <!-- Save -->
                                                                <button @click="saveUserPrediction(item.match); justSaved = true; setTimeout(() => justSaved = false, 2000)"
                                                                    class="w-6 h-6 rounded flex items-center justify-center transition-all shrink-0"
                                                                    :class="justSaved ? 'bg-apple-blue text-white' : 'text-apple-blue hover:bg-apple-blue/10'">
                                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                                                                </button>
                                                                <!-- Clear -->
                                                                <button @click="clearPrediction(item.match)"
                                                                    class="w-6 h-6 rounded flex items-center justify-center text-gray-300 hover:text-[#EF4444] transition shrink-0"
                                                                    title="Clear">
                                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                                                                </button>
                                                                <!-- Copy AI -->
                                                                <button @click="copyAI(item)"
                                                                    class="text-[10px] font-semibold text-apple-gray hover:text-apple-blue transition shrink-0 px-0.5"
                                                                    title="Copy AI prediction">AI</button>
                                                            </div>
                                                        </template>
                                                    </div>

                                                    <!-- Actual result + accuracy tag -->
                                                    <div class="w-24 shrink-0 flex items-center justify-center gap-1.5">
                                                        <template x-if="item.match.actual_home_goals !== null && item.match.actual_home_goals !== undefined">
                                                            <div class="flex items-center gap-1.5">
                                                                <span class="text-sm font-extrabold tabular-nums text-apple-dark dark:text-white" x-text="item.match.actual_home_goals + ' - ' + item.match.actual_away_goals"></span>
                                                                <span x-show="aiGotExact(item)" class="text-[10px] font-semibold text-[#22C55E]">exact</span>
                                                                <span x-show="!aiGotExact(item) && aiGotOutcome(item)" class="text-[10px] font-semibold text-[#F59E0B]">close</span>
                                                                <span x-show="!aiGotExact(item) && !aiGotOutcome(item)" class="text-[10px] font-semibold text-[#EF4444]">miss</span>
                                                            </div>
                                                        </template>
                                                        <template x-if="item.match.actual_home_goals === null || item.match.actual_home_goals === undefined">
                                                            <span class="text-xs text-gray-300 dark:text-gray-600">—</span>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty -->
        <div x-show="activeTab === 'matches' && !loading && allMatches.length === 0" class="text-center py-20">
            <div class="text-4xl mb-4">⚽</div>
            <p class="text-apple-gray text-sm">No matches found</p>
        </div>

        <!-- History Tab -->
        <div x-show="activeTab === 'history' && !loading" class="space-y-6">

                <!-- Score Cards -->
                <div class="grid grid-cols-2 gap-4">
                    <!-- AI Card -->
                    <div class="bg-white dark:bg-[#1a2234] rounded-xl border border-apple-border dark:border-white/5 p-5">
                        <p class="text-[11px] font-semibold text-apple-gray uppercase tracking-wider mb-1">AI Predictions</p>
                        <p class="text-[11px] text-apple-gray mb-4" x-text="historyStats.total + ' matches analyzed'"></p>
                        <div class="space-y-2.5">
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs text-apple-gray">Exact Score</span>
                                <span class="text-xl tabular-nums" :class="historyStats.userCount > 0 && historyStats.aiExactRate >= historyStats.userExactRate ? 'font-extrabold text-apple-blue' : 'font-bold text-apple-dark dark:text-white'" x-text="(historyStats.aiExactRate * 100).toFixed(1) + '%'"></span>
                            </div>
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs text-apple-gray">Correct Outcome</span>
                                <span class="text-xl tabular-nums" :class="historyStats.userCount > 0 && historyStats.aiOutcomeRate >= historyStats.userOutcomeRate ? 'font-extrabold text-apple-blue' : 'font-bold text-apple-dark dark:text-white'" x-text="(historyStats.aiOutcomeRate * 100).toFixed(1) + '%'"></span>
                            </div>
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs text-apple-gray">Avg Error</span>
                                <span class="text-xl font-bold tabular-nums text-apple-dark dark:text-white" x-text="historyStats.aiMae.toFixed(2) + ' goals'"></span>
                            </div>
                        </div>
                    </div>
                    <!-- User Card -->
                    <div class="bg-white dark:bg-[#1a2234] rounded-xl border border-apple-border dark:border-white/5 p-5">
                        <p class="text-[11px] font-semibold text-apple-gray uppercase tracking-wider mb-1">Your Predictions</p>
                        <p class="text-[11px] text-apple-gray mb-4" x-text="historyStats.userCount + ' predictions made'"></p>
                        <template x-if="historyStats.userCount > 0">
                            <div class="space-y-2.5">
                                <div class="flex justify-between items-baseline">
                                    <span class="text-xs text-apple-gray">Exact Score</span>
                                    <span class="text-xl tabular-nums" :class="historyStats.userExactRate > historyStats.aiExactRate ? 'font-extrabold text-apple-blue' : 'font-bold text-apple-dark dark:text-white'" x-text="(historyStats.userExactRate * 100).toFixed(1) + '%'"></span>
                                </div>
                                <div class="flex justify-between items-baseline">
                                    <span class="text-xs text-apple-gray">Correct Outcome</span>
                                    <span class="text-xl tabular-nums" :class="historyStats.userOutcomeRate > historyStats.aiOutcomeRate ? 'font-extrabold text-apple-blue' : 'font-bold text-apple-dark dark:text-white'" x-text="(historyStats.userOutcomeRate * 100).toFixed(1) + '%'"></span>
                                </div>
                                <div class="flex justify-between items-baseline">
                                    <span class="text-xs text-apple-gray">Avg Error</span>
                                    <span class="text-xl tabular-nums" :class="historyStats.userMae < historyStats.aiMae ? 'font-extrabold text-apple-blue' : 'font-bold text-apple-dark dark:text-white'" x-text="historyStats.userMae.toFixed(2) + ' goals'"></span>
                                </div>
                            </div>
                        </template>
                        <template x-if="historyStats.userCount === 0">
                            <p class="text-[13px] text-apple-gray leading-relaxed">Save predictions on the Matches tab to see your accuracy stats here.</p>
                        </template>
                    </div>
                </div>

                <!-- Charts row -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white dark:bg-[#1a2234] rounded-xl border border-apple-border dark:border-white/5 p-5">
                        <p class="text-[11px] font-semibold text-apple-gray uppercase tracking-wider mb-4">Accuracy by League</p>
                        <div style="height:220px"><canvas :id="'leagueChart-' + _chartKey"></canvas></div>
                    </div>
                    <div class="bg-white dark:bg-[#1a2234] rounded-xl border border-apple-border dark:border-white/5 p-5">
                        <p class="text-[11px] font-semibold text-apple-gray uppercase tracking-wider mb-4">Accuracy Over Time</p>
                        <div style="height:220px"><canvas :id="'timeChart-' + _chartKey"></canvas></div>
                    </div>
                </div>

                <!-- Insights -->
                <div x-show="historyStats.insights.length > 0" class="space-y-2">
                    <p class="text-[11px] font-semibold text-apple-gray uppercase tracking-wider mb-2">Insights</p>
                    <template x-for="(insight, i) in historyStats.insights" :key="i">
                        <div class="bg-white dark:bg-[#1a2234] rounded-xl border border-apple-border dark:border-white/5 px-4 py-3 flex items-start gap-2.5">
                            <span class="text-sm shrink-0 mt-px">💡</span>
                            <p class="text-[13px] text-apple-dark dark:text-gray-300 leading-relaxed" x-text="insight"></p>
                        </div>
                    </template>
                </div>

                <!-- Prediction Log -->
                <div class="bg-white dark:bg-[#1a2234] rounded-xl border border-apple-border dark:border-white/5 overflow-hidden">
                    <div class="px-5 py-3">
                        <p class="text-[11px] font-semibold text-apple-gray uppercase tracking-wider">Prediction Log</p>
                    </div>
                    <div class="grid grid-cols-12 gap-2 px-5 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-apple-gray border-y border-gray-100 dark:border-white/5">
                        <div class="col-span-1">Date</div>
                        <div class="col-span-3">Match</div>
                        <div class="col-span-2 text-center">AI</div>
                        <div class="col-span-2 text-center">You</div>
                        <div class="col-span-2 text-center">Actual</div>
                        <div class="col-span-1 text-center">AI</div>
                        <div class="col-span-1 text-center">You</div>
                    </div>
                    <template x-for="row in historyStats.log" :key="row.key">
                        <div class="grid grid-cols-12 gap-2 px-5 py-2.5 text-xs border-b border-gray-50 dark:border-white/[0.03] hover:bg-apple-bg/30 dark:hover:bg-white/[0.015] transition-colors">
                            <div class="col-span-1 text-apple-gray tabular-nums" x-text="row.date.slice(5)"></div>
                            <div class="col-span-3 font-medium text-apple-dark dark:text-gray-200 truncate" x-text="row.home + ' vs ' + row.away"></div>
                            <div class="col-span-2 text-center tabular-nums font-semibold text-apple-dark dark:text-gray-300" x-text="row.aiH + ' - ' + row.aiA"></div>
                            <div class="col-span-2 text-center tabular-nums font-semibold" :class="row.userH !== null ? 'text-apple-dark dark:text-gray-300' : 'text-gray-300 dark:text-gray-600'" x-text="row.userH !== null ? row.userH + ' - ' + row.userA : '—'"></div>
                            <div class="col-span-2 text-center tabular-nums font-extrabold text-apple-dark dark:text-white" x-text="row.actH + ' - ' + row.actA"></div>
                            <div class="col-span-1 text-center">
                                <span :class="{'text-[#22C55E]': row.aiRes === 'exact', 'text-[#F59E0B]': row.aiRes === 'close', 'text-[#EF4444]': row.aiRes === 'miss'}" class="text-[10px] font-semibold" x-text="row.aiRes"></span>
                            </div>
                            <div class="col-span-1 text-center">
                                <span x-show="row.userRes" :class="{'text-[#22C55E]': row.userRes === 'exact', 'text-[#F59E0B]': row.userRes === 'close', 'text-[#EF4444]': row.userRes === 'miss'}" class="text-[10px] font-semibold" x-text="row.userRes"></span>
                                <span x-show="!row.userRes" class="text-gray-300 dark:text-gray-600">—</span>
                            </div>
                        </div>
                    </template>
                </div>
        </div>
    </div>

    <script>
    function goalcastApp() {
        return {
            activeTab: 'matches',
            loading: false,
            error: null,
            allMatches: [],
            currentUser: null,
            userPredictions: {},
            savedPredictions: {},
            darkMode: false,
            toast: null,
            _toastTimer: null,
            signInPulse: false,
            myPredictionsOnly: false,
            historyDateStart: '',
            historyDateEnd: '',
            // Filters
            filterLeagues: [],
            filterTeams: [],
            // Pre-computed cached arrays (avoid re-filtering on every render)
            availableLeagues: [],
            availableTeams: [],
            filteredMatches: [],
            matchesTabData: [],
            groupedData: [],
            _visibleGroups: 15,
            _recomputeTimer: null,

            _computeAvailables() {
                const leagues = new Set();
                const teams = new Set();
                this.allMatches.forEach(m => {
                    leagues.add(m.match.league);
                    teams.add(m.match.home_team);
                    teams.add(m.match.away_team);
                });
                this.availableLeagues = [...leagues].sort();
                this.availableTeams = [...teams].sort();
            },

            isFilterActive(type) {
                if (type === 'leagues') return this.filterLeagues.length > 0 && this.filterLeagues.length < this.availableLeagues.length;
                if (type === 'teams') return this.filterTeams.length > 0 && this.filterTeams.length < this.availableTeams.length;
                return false;
            },
            get hasActiveFilters() {
                return this.isFilterActive('leagues') || this.isFilterActive('teams');
            },

            _recompute() {
                // 1. Filter matches by league + team
                const leagueActive = this.isFilterActive('leagues');
                const teamActive = this.isFilterActive('teams');
                const fl = this.filterLeagues;
                const ft = this.filterTeams;
                this.filteredMatches = this.allMatches.filter(item => {
                    if (leagueActive && !fl.includes(item.match.league)) return false;
                    if (teamActive && !ft.includes(item.match.home_team) && !ft.includes(item.match.away_team)) return false;
                    return true;
                });

                // 2. Matches tab: rolling window (3 days back + today + all future)
                const today = new Date(); today.setHours(0,0,0,0);
                const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - 3);
                const cutoffStr = cutoff.toISOString().slice(0,10);
                this.matchesTabData = this.filteredMatches.filter(item => {
                    const d = new Date(item.match.match_date).toISOString().slice(0,10);
                    return d >= cutoffStr;
                });

                // 3. Group by date → league
                const dateMap = {};
                this.matchesTabData.forEach(item => {
                    const dateKey = new Date(item.match.match_date).toISOString().slice(0, 10);
                    if (!dateMap[dateKey]) dateMap[dateKey] = {};
                    const league = item.match.league;
                    if (!dateMap[dateKey][league]) dateMap[dateKey][league] = [];
                    dateMap[dateKey][league].push(item);
                });

                const todayStr = new Date().toISOString().slice(0, 10);
                const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                const dates = Object.keys(dateMap).sort();

                this.groupedData = dates.map(date => {
                    const leagueNames = Object.keys(dateMap[date]).sort();
                    const leagues = leagueNames.map(league => ({
                        league,
                        matches: dateMap[date][league].sort((a, b) =>
                            new Date(a.match.match_date) - new Date(b.match.match_date)
                        ),
                        open: true,
                    }));
                    const matchCount = leagues.reduce((sum, l) => sum + l.matches.length, 0);
                    // Collapse dates older than yesterday
                    const isOld = date < yesterdayStr;
                    return { date, leagues, matchCount, open: !isOld };
                });

                this._visibleGroups = 15;
            },

            _debouncedRecompute() {
                clearTimeout(this._recomputeTimer);
                this._recomputeTimer = setTimeout(() => this._recompute(), 200);
            },

            _handleScroll() {
                if (this.activeTab !== 'matches') return;
                const nearBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400;
                if (nearBottom && this._visibleGroups < this.groupedData.length) {
                    this._visibleGroups = Math.min(this._visibleGroups + 10, this.groupedData.length);
                }
            },

            async init() {
                const saved = localStorage.getItem('darkMode');
                this.darkMode = saved !== null ? saved === 'true' : false;
                // Predictions are server-only for logged-in users; clear any stale localStorage data
                localStorage.removeItem('savedPredictions');
                localStorage.removeItem('userPredictions');

                // Default date range: last 7 days
                const todayStr = new Date().toISOString().slice(0, 10);
                const sevenDaysAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
                this.historyDateStart = sevenDaysAgo;
                this.historyDateEnd = todayStr;

                // Fetch current user (blocking — needed before loadData for server predictions)
                try {
                    const authRes = await fetch('/auth/me');
                    if (authRes.ok) {
                        const authData = await authRes.json();
                        if (authData && authData.user) this.currentUser = authData.user;
                    }
                } catch (e) {}

                await this.loadData();

                // Debounced recompute on filter changes
                this.$watch('filterLeagues', () => {
                    this._debouncedRecompute();
                    if (this.activeTab === 'history') { this._chartKey++; this.$nextTick(() => this.renderHistoryCharts()); }
                });
                this.$watch('filterTeams', () => {
                    this._debouncedRecompute();
                    if (this.activeTab === 'history') { this._chartKey++; this.$nextTick(() => this.renderHistoryCharts()); }
                });
                // History-specific watchers (don't need _recompute, historyStats reads filteredMatches)
                this.$watch('activeTab', (val) => {
                    if (val === 'history') { this._chartKey++; this.$nextTick(() => this.renderHistoryCharts()); }
                });
                this.$watch('historyDateStart', () => {
                    if (this.activeTab === 'history') { this._chartKey++; this.$nextTick(() => this.renderHistoryCharts()); }
                });
                this.$watch('historyDateEnd', () => {
                    if (this.activeTab === 'history') { this._chartKey++; this.$nextTick(() => this.renderHistoryCharts()); }
                });
                this.$watch('myPredictionsOnly', () => {
                    if (this.activeTab === 'history') { this._chartKey++; this.$nextTick(() => this.renderHistoryCharts()); }
                });
                // Infinite scroll
                window.addEventListener('scroll', () => this._handleScroll(), { passive: true });
            },

            toggleTheme() {
                this.darkMode = !this.darkMode;
                localStorage.setItem('darkMode', this.darkMode);
            },

            showToast(msg) {
                this.toast = msg;
                clearTimeout(this._toastTimer);
                this._toastTimer = setTimeout(() => { this.toast = null; }, 2000);
            },

            requireAuth() {
                if (this.currentUser) return true;
                this.showToast('Sign in to save your predictions');
                this.signInPulse = true;
                setTimeout(() => { this.signInPulse = false; }, 2000);
                return false;
            },

            async loadData() {
                this.loading = true;
                this.error = null;
                try {
                    let r = await fetch('/api/matches');
                    if (!r.ok) throw new Error('Failed to fetch matches');
                    this.allMatches = await r.json();

                    if (this.allMatches.length === 0) {
                        // DB empty — wait for startup refresh
                        this.refreshing = true;
                        this.refreshStage = 'Waiting for startup data...';
                        this.refreshPct = 10;
                        const poll = setInterval(async () => {
                            const r2 = await fetch('/api/matches');
                            if (r2.ok) {
                                const data = await r2.json();
                                if (data.length > 0) {
                                    clearInterval(poll);
                                    this.allMatches = data;
                                    this._initUserPredictions();
                                    this._computeAvailables();
                                    this._recompute();
                                    this._scrollToToday();
                                    this.refreshPct = 100;
                                    this.refreshStage = `${data.length} matches loaded`;
                                    setTimeout(() => { this.refreshing = false; this.loading = false; }, 1000);
                                }
                            }
                        }, 5000);
                        return;
                    }

                    this._initUserPredictions();
                    this._computeAvailables();
                    this._recompute();
                    this._scrollToToday();
                } catch (err) {
                    this.error = err.message;
                } finally {
                    this.loading = false;
                }
            },

            // Refresh with progress overlay
            refreshing: false,
            refreshPct: 0,
            refreshStage: '',

            async doRefresh() {
                this.refreshing = true;
                this.refreshPct = 0;
                this.refreshStage = 'Starting refresh...';
                this.error = null;

                // 1. Fire refresh (returns immediately — runs in background on server)
                try {
                    const r = await fetch('/api/refresh', { method: 'POST' });
                    if (!r.ok) throw new Error('Failed to start refresh');
                    const data = await r.json();
                    if (data.status === 'already_running') {
                        this.refreshStage = 'Refresh already in progress...';
                    }
                } catch (err) {
                    this.refreshing = false;
                    this.error = err.message;
                    return;
                }

                // 2. Simulated progress stages while polling
                const stages = [
                    [5, 'Fetching team ratings...'],
                    [15, 'Loading Premier League...'],
                    [25, 'Loading La Liga...'],
                    [35, 'Loading Serie A & Bundesliga...'],
                    [50, 'Loading Ligue 1 & Liga Portugal...'],
                    [60, 'Loading Champions League...'],
                    [70, 'Loading international matches...'],
                    [80, 'Fitting prediction model...'],
                    [88, 'Generating predictions...'],
                ];
                let stageIdx = 0;
                const ticker = setInterval(() => {
                    if (stageIdx < stages.length) {
                        this.refreshPct = stages[stageIdx][0];
                        this.refreshStage = stages[stageIdx][1];
                        stageIdx++;
                    } else if (this.refreshPct < 92) {
                        this.refreshPct += 0.3;
                    }
                }, 3000);

                // 3. Poll /api/refresh-status until done (max 3 minutes)
                const startedAt = Date.now();
                const lastRefreshBefore = await fetch('/api/refresh-status').then(r => r.json()).then(d => d.last_refresh).catch(() => null);

                const poll = setInterval(async () => {
                    try {
                        const sr = await fetch('/api/refresh-status');
                        if (!sr.ok) return;
                        const status = await sr.json();

                        // Done when: not refreshing AND last_refresh changed
                        if (!status.is_refreshing && status.last_refresh !== lastRefreshBefore) {
                            clearInterval(poll);
                            clearInterval(ticker);

                            this.refreshPct = 95;
                            this.refreshStage = 'Reloading matches...';

                            const r2 = await fetch('/api/matches');
                            if (r2.ok) this.allMatches = await r2.json();
                            this._initUserPredictions();
                            this._computeAvailables();
                            this._recompute();

                            this.refreshPct = 100;
                            this.refreshStage = `Done! ${status.matches_in_db} matches loaded`;
                            setTimeout(() => { this.refreshing = false; this._scrollToToday(); }, 1200);
                        }

                        // Timeout after 3 minutes
                        if (Date.now() - startedAt > 180000) {
                            clearInterval(poll);
                            clearInterval(ticker);
                            this.refreshing = false;
                            this.error = 'Refresh timed out — try again later';
                        }
                    } catch (e) {}
                }, 5000);
            },

            _initUserPredictions() {
                // When logged in, server is the sole source of truth — discard any stale localStorage state
                if (this.currentUser) {
                    this.savedPredictions = {};
                    this.userPredictions = {};
                    localStorage.removeItem('savedPredictions');
                    localStorage.removeItem('userPredictions');
                }

                this.allMatches.forEach(item => {
                    const key = this.getMatchKey(item.match);
                    if (this.currentUser && item.user_prediction) {
                        this.userPredictions[key] = { home: item.user_prediction.home, away: item.user_prediction.away };
                        this.savedPredictions[key] = true;
                    } else if (!this.userPredictions[key]) {
                        this.userPredictions[key] = { home: null, away: null };
                    }
                });
            },

            clearFilters() {
                this.filterLeagues = [];
                this.filterTeams = [];
                const todayStr = new Date().toISOString().slice(0, 10);
                const sevenDaysAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
                this.historyDateStart = sevenDaysAgo;
                this.historyDateEnd = todayStr;
            },

            formatDateShort(dateStr) {
                const d = new Date(dateStr + 'T12:00:00');
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
            },

            _scrollToToday() {
                this.$nextTick(() => {
                    const todayStr = new Date().toISOString().slice(0, 10);
                    const el = document.getElementById('date-' + todayStr);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            },

            getMatchKey(match) {
                return match.api_match_id || `${match.home_team}_${match.away_team}`;
            },

            isSaved(match) {
                return !!this.savedPredictions[this.getMatchKey(match)];
            },

            saveUserPrediction(match) {
                if (!this.requireAuth()) return false;
                const key = this.getMatchKey(match);
                const p = this.userPredictions[key];
                if (p.home === null || p.home === '' || p.away === null || p.away === '') return false;

                // Optimistic update — will be rolled back on error
                this.savedPredictions[key] = true;

                fetch('/api/predictions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ match_id: key, home: p.home, away: p.away }),
                }).then(r => {
                    if (!r.ok) {
                        delete this.savedPredictions[key];
                        if (r.status === 401) {
                            this.currentUser = null;
                            this.showToast('Session expired — please sign in again');
                        } else {
                            this.showToast('Save failed — please try again');
                        }
                    }
                }).catch(() => {
                    delete this.savedPredictions[key];
                    this.showToast('Save failed — check your connection');
                });

                return true;
            },

            saveAll() {
                if (!this.requireAuth()) return;
                const toSave = [];
                this.allMatches.forEach(item => {
                    const key = this.getMatchKey(item.match);
                    if (this.savedPredictions[key]) return;
                    const p = this.userPredictions[key];
                    if (p && p.home !== null && p.home !== '' && p.away !== null && p.away !== '') {
                        this.savedPredictions[key] = true; // optimistic
                        toSave.push({ match_id: key, home: p.home, away: p.away });
                    }
                });

                if (toSave.length === 0) {
                    this.showToast('No new predictions to save');
                    return;
                }

                const saves = toSave.map(pred =>
                    fetch('/api/predictions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify(pred),
                    }).then(r => {
                        if (!r.ok) {
                            delete this.savedPredictions[pred.match_id];
                            if (r.status === 401) this.currentUser = null;
                            return false;
                        }
                        return true;
                    }).catch(() => { delete this.savedPredictions[pred.match_id]; return false; })
                );

                Promise.all(saves).then(results => {
                    const saved = results.filter(Boolean).length;
                    if (this.currentUser === null) {
                        this.showToast('Session expired — please sign in again');
                    } else {
                        this.showToast(`Saved ${saved} prediction${saved !== 1 ? 's' : ''}`);
                    }
                });
            },

            copyAI(item) {
                if (!this.requireAuth()) return;
                const key = this.getMatchKey(item.match);
                this.userPredictions[key] = {
                    home: item.prediction.predicted_home_goals,
                    away: item.prediction.predicted_away_goals,
                };
            },

            copyAllAIForDate(dateGroup) {
                if (!this.requireAuth()) return;
                let count = 0;
                for (const leagueGroup of dateGroup.leagues) {
                    for (const item of leagueGroup.matches) {
                        const key = this.getMatchKey(item.match);
                        if (this.savedPredictions[key]) continue; // Already saved
                        const p = this.userPredictions[key];
                        if (p && p.home !== null && p.home !== '' && p.away !== null && p.away !== '') continue; // Already filled
                        this.userPredictions[key] = {
                            home: item.prediction.predicted_home_goals,
                            away: item.prediction.predicted_away_goals,
                        };
                        count++;
                    }
                }
                if (count > 0) this.showToast(`Copied AI for ${count} matches`);
            },

            clearPrediction(match) {
                const key = this.getMatchKey(match);
                this.userPredictions[key] = { home: null, away: null };
            },

            async deletePrediction(match) {
                const key = this.getMatchKey(match);
                delete this.savedPredictions[key];
                this.userPredictions[key] = { home: null, away: null };
                try {
                    const r = await fetch(`/api/predictions/${key}`, {
                        method: 'DELETE',
                        credentials: 'same-origin',
                    });
                    if (!r.ok && r.status === 401) {
                        this.currentUser = null;
                        this.showToast('Session expired — please sign in again');
                    }
                } catch (e) {}
            },


            isToday(dateStr) {
                return dateStr === new Date().toISOString().slice(0, 10);
            },

            isFuture(dateStr) {
                return dateStr > new Date().toISOString().slice(0, 10);
            },

            formatDateHeader(dateStr) {
                const d = new Date(dateStr + 'T12:00:00');
                const today = new Date(); today.setHours(12,0,0,0);
                const diff = Math.round((d - today) / 86400000);
                const formatted = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                if (diff === 0) return 'Today — ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
                if (diff === 1) return 'Tomorrow — ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
                if (diff === -1) return 'Yesterday — ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
                return formatted;
            },

            formatTime(dateStr) {
                const d = new Date(dateStr);
                // If stored as midnight UTC, kick-off time is unconfirmed
                if (d.getUTCHours() === 0 && d.getUTCMinutes() === 0) return 'TBD';
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            },

            leagueColor(league) {
                const c = { 'Premier League':'#3d195b', 'La Liga':'#ee8707', 'Serie A':'#024494', 'Bundesliga':'#d20515', 'Ligue 1':'#091c3e', 'Liga Portugal':'#00645a', 'Champions League':'#081c5a', 'Europa League':'#f57c00', 'Conference League':'#00a651', 'World Cup':'#56042c', 'European Championship':'#004b87', 'WC Qualifiers UEFA':'#1a472a', 'WC Qualifiers CONMEBOL':'#1b5e20', 'WC Qualifiers CONCACAF':'#2e7d32', 'Nations League':'#00205b', 'Friendlies':'#757575' };
                return c[league] || '#007AFF';
            },

            aiGotExact(item) {
                if (item.match.actual_home_goals === null) return false;
                return item.prediction.predicted_home_goals === item.match.actual_home_goals
                    && item.prediction.predicted_away_goals === item.match.actual_away_goals;
            },

            aiGotOutcome(item) {
                if (item.match.actual_home_goals === null) return false;
                const ao = Math.sign(item.match.actual_home_goals - item.match.actual_away_goals);
                const po = Math.sign(item.prediction.predicted_home_goals - item.prediction.predicted_away_goals);
                return ao === po;
            },

            confidenceColor(pct) {
                // Smooth gradient: 30%=red → 40%=orange → 50%=amber → 60%=yellow-green → 80%+=green
                if (pct == null) return '#6B7280';
                const stops = [
                    [30, [220,38,38]],   // #DC2626
                    [40, [249,115,22]],  // #F97316
                    [50, [234,179,8]],   // #EAB308
                    [60, [132,204,22]],  // #84CC16
                    [80, [22,163,74]],   // #16A34A
                ];
                if (pct <= stops[0][0]) return `rgb(${stops[0][1]})`;
                if (pct >= stops[stops.length-1][0]) return `rgb(${stops[stops.length-1][1]})`;
                for (let i = 0; i < stops.length - 1; i++) {
                    if (pct >= stops[i][0] && pct <= stops[i+1][0]) {
                        const t = (pct - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
                        const c = stops[i][1].map((v, j) => Math.round(v + t * (stops[i+1][1][j] - v)));
                        return `rgb(${c})`;
                    }
                }
                return '#6B7280';
            },

            confidenceText(pct) {
                // Use dark text for lighter backgrounds (amber/yellow range ~45-58%)
                if (pct != null && pct >= 45 && pct <= 58) return '#1D1D1F';
                return '#FFFFFF';
            },

            getResultBorderClass(item) {
                if (item.match.actual_home_goals === null) return '';
                if (this.aiGotExact(item)) return 'border-l-[3px] !border-l-[#22C55E]';
                if (this.aiGotOutcome(item)) return 'border-l-[3px] !border-l-[#F59E0B]';
                return 'border-l-[3px] !border-l-[#EF4444]/40';
            },

            exportCSV() {
                const log = this.historyStats.log;
                const headers = ['Date','League','Home Team','Away Team','Actual Home Goals','Actual Away Goals','AI Predicted Home','AI Predicted Away','User Predicted Home','User Predicted Away','AI Accuracy','User Accuracy'];
                const rows = log.map(row => [
                    row.date, row.league || '', row.home, row.away,
                    row.actH, row.actA, row.aiH, row.aiA,
                    row.userH !== null ? row.userH : '',
                    row.userA !== null ? row.userA : '',
                    row.aiRes, row.userRes || '',
                ]);
                const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
                const today = new Date().toISOString().slice(0, 10);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `goalcast_history_${today}.csv`;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                this.showToast(`Exported ${rows.length} matches`);
            },

            // ── History stats (computed from filteredMatches, reactive to filters) ──
            _chartKey: 0,
            _leagueChart: null,
            _timeChart: null,
            _lastHistoryJson: '',

            get historyStats() {
                const oc = (h, a) => h > a ? 'W' : (h < a ? 'L' : 'D');
                let finished = this.filteredMatches.filter(m =>
                    m.match.status === 'finished' && m.match.actual_home_goals !== null && m.prediction
                );

                // Date range filter
                if (this.historyDateStart) {
                    finished = finished.filter(m => new Date(m.match.match_date).toISOString().slice(0, 10) >= this.historyDateStart);
                }
                if (this.historyDateEnd) {
                    finished = finished.filter(m => new Date(m.match.match_date).toISOString().slice(0, 10) <= this.historyDateEnd);
                }

                // My predictions only
                if (this.myPredictionsOnly && this.currentUser) {
                    finished = finished.filter(m => {
                        const key = this.getMatchKey(m.match);
                        const up = this.savedPredictions[key] ? this.userPredictions[key] : null;
                        return up && up.home !== null && up.away !== null;
                    });
                }

                let aiExact = 0, aiOutcome = 0, aiMaeH = 0, aiMaeA = 0;
                let userExact = 0, userOutcome = 0, userMaeH = 0, userMaeA = 0, userCount = 0;
                let h2hAiExact = 0, h2hAiOutcome = 0; // AI stats only on matches user also predicted
                const leagueMap = {};
                const dateMap = {};
                const log = [];

                for (const m of finished) {
                    const p = m.prediction, mt = m.match;
                    const actH = mt.actual_home_goals, actA = mt.actual_away_goals;
                    const aiH = p.predicted_home_goals, aiA = p.predicted_away_goals;
                    const key = this.getMatchKey(mt);

                    const aiE = aiH === actH && aiA === actA;
                    const aiO = oc(aiH, aiA) === oc(actH, actA);
                    if (aiE) aiExact++;
                    if (aiO) aiOutcome++;
                    aiMaeH += Math.abs(aiH - actH);
                    aiMaeA += Math.abs(aiA - actA);

                    // User prediction
                    const up = this.savedPredictions[key] ? this.userPredictions[key] : null;
                    let userH = null, userA = null, userRes = null;
                    if (up && up.home !== null && up.away !== null) {
                        userH = +up.home; userA = +up.away;
                        userCount++;
                        const uE = userH === actH && userA === actA;
                        const uO = oc(userH, userA) === oc(actH, actA);
                        if (uE) userExact++;
                        if (uO) userOutcome++;
                        userMaeH += Math.abs(userH - actH);
                        userMaeA += Math.abs(userA - actA);
                        userRes = uE ? 'exact' : (uO ? 'close' : 'miss');
                        // Head-to-head: AI accuracy on this same match
                        if (aiE) h2hAiExact++;
                        if (aiO) h2hAiOutcome++;
                    }

                    // League
                    const lg = mt.league;
                    if (!leagueMap[lg]) leagueMap[lg] = { m: 0, aiO: 0, uC: 0, uO: 0 };
                    leagueMap[lg].m++;
                    if (aiO) leagueMap[lg].aiO++;
                    if (userRes) { leagueMap[lg].uC++; if (userRes !== 'miss') leagueMap[lg].uO++; }

                    // Date
                    const dt = new Date(mt.match_date).toISOString().slice(0, 10);
                    if (!dateMap[dt]) dateMap[dt] = { total: 0, aiO: 0 };
                    dateMap[dt].total++;
                    if (aiO) dateMap[dt].aiO++;

                    log.push({
                        key, date: dt, league: mt.league, home: mt.home_team, away: mt.away_team,
                        aiH, aiA, userH, userA, actH, actA,
                        aiRes: aiE ? 'exact' : (aiO ? 'close' : 'miss'), userRes
                    });
                }

                const t = finished.length;
                const byLeague = Object.entries(leagueMap).sort((a,b) => a[0].localeCompare(b[0])).map(([lg, d]) => ({
                    league: lg, matches: d.m,
                    aiRate: d.m ? d.aiO / d.m : 0,
                    userRate: d.uC ? d.uO / d.uC : 0,
                    userCount: d.uC,
                }));

                const dates = Object.keys(dateMap).sort();
                let cumT = 0, cumO = 0;
                const byDate = dates.map(dt => {
                    cumT += dateMap[dt].total; cumO += dateMap[dt].aiO;
                    return { date: dt, total: dateMap[dt].total, aiO: dateMap[dt].aiO, cumRate: cumT ? cumO/cumT*100 : 0 };
                });

                // Insights
                const insights = [];
                if (t > 0) {
                    const avgActual = finished.reduce((s, m) => s + m.match.actual_home_goals + m.match.actual_away_goals, 0) / t;
                    const avgAI = finished.reduce((s, m) => s + m.prediction.predicted_home_goals + m.prediction.predicted_away_goals, 0) / t;
                    if (Math.abs(avgActual - avgAI) > 0.3) {
                        const dir = avgAI < avgActual ? 'underestimates' : 'overestimates';
                        insights.push(`Avg goals/match: ${avgActual.toFixed(1)} actual vs ${avgAI.toFixed(1)} AI — the model ${dir} scoring by ${Math.abs(avgActual - avgAI).toFixed(1)}.`);
                    }
                    if (userCount >= 3) {
                        // Head-to-head comparison (same matches only)
                        const h2hAiR = h2hAiOutcome / userCount;
                        const uR = userOutcome / userCount;
                        if (uR > h2hAiR) insights.push(`Head-to-head: you beat the AI (${(uR*100).toFixed(0)}% vs ${(h2hAiR*100).toFixed(0)}% correct outcome on ${userCount} shared matches).`);
                        else if (h2hAiR > uR) insights.push(`Head-to-head: AI beats you (${(h2hAiR*100).toFixed(0)}% vs ${(uR*100).toFixed(0)}% correct outcome on ${userCount} shared matches).`);
                        else insights.push(`Head-to-head: tied with AI at ${(uR*100).toFixed(0)}% correct outcome on ${userCount} shared matches.`);
                    }
                    const aiDraws = finished.filter(m => oc(m.prediction.predicted_home_goals, m.prediction.predicted_away_goals) === 'D').length;
                    const actDraws = finished.filter(m => oc(m.match.actual_home_goals, m.match.actual_away_goals) === 'D').length;
                    if (actDraws > aiDraws && actDraws >= 2) insights.push(`AI underestimates draws (${aiDraws} predicted vs ${actDraws} actual).`);
                    if (byLeague.length >= 2) {
                        const sorted = [...byLeague].filter(l => l.matches >= 2).sort((a,b) => a.aiRate - b.aiRate);
                        if (sorted.length >= 2 && sorted[sorted.length-1].aiRate > sorted[0].aiRate + 0.1)
                            insights.push(`AI strongest in ${sorted[sorted.length-1].league} (${(sorted[sorted.length-1].aiRate*100).toFixed(0)}%), weakest in ${sorted[0].league} (${(sorted[0].aiRate*100).toFixed(0)}%).`);
                    }
                } else {
                    insights.push('No finished matches to analyze. Hit Refresh to load data.');
                }

                log.sort((a, b) => b.date.localeCompare(a.date));

                return {
                    total: t,
                    aiExactRate: t ? aiExact / t : 0,
                    aiOutcomeRate: t ? aiOutcome / t : 0,
                    aiMae: t ? (aiMaeH + aiMaeA) / (2 * t) : 0,
                    userCount,
                    userExactRate: userCount ? userExact / userCount : 0,
                    userOutcomeRate: userCount ? userOutcome / userCount : 0,
                    userMae: userCount ? (userMaeH + userMaeA) / (2 * userCount) : 0,
                    // Head-to-head: AI accuracy only on matches user also predicted
                    h2hAiExactRate: userCount ? h2hAiExact / userCount : 0,
                    h2hAiOutcomeRate: userCount ? h2hAiOutcome / userCount : 0,
                    byLeague, byDate, log, insights,
                };
            },

            renderHistoryCharts() {
                const s = this.historyStats;
                const json = JSON.stringify({ bl: s.byLeague.length, bd: s.byDate.length, t: s.total });
                if (json === this._lastHistoryJson) return;
                this._lastHistoryJson = json;

                this.$nextTick(() => {
                    const isDark = document.documentElement.classList.contains('dark');
                    const grid = isDark ? 'rgba(255,255,255,0.04)' : '#F5F5F7';
                    const text = isDark ? '#86868B' : '#6E6E73';
                    const legendOpts = { position: 'top', align: 'end', labels: { font: { size: 10, family: 'Inter' }, color: text, usePointStyle: true, pointStyle: 'circle', padding: 12, boxWidth: 6 } };
                    const yOpts = { beginAtZero: true, max: 100, grid: { color: grid, drawBorder: false }, ticks: { color: text, font: { size: 9 }, callback: v => v + '%', stepSize: 25 }, border: { display: false } };
                    const xOpts = { grid: { display: false }, ticks: { color: text, font: { size: 9 } }, border: { display: false } };

                    // League bar chart
                    const lc = document.querySelector(`[id^="leagueChart-"]`);
                    if (lc) {
                        if (this._leagueChart) this._leagueChart.destroy();
                        this._leagueChart = new Chart(lc, {
                            type: 'bar',
                            data: {
                                labels: s.byLeague.map(l => l.league.replace('Premier League','PL').replace('Champions League','UCL').replace('Liga Portugal','Portugal')),
                                datasets: [
                                    { label: 'AI', data: s.byLeague.map(l => +(l.aiRate * 100).toFixed(1)), backgroundColor: 'rgba(0,122,255,0.6)', borderRadius: 5, barPercentage: 0.65 },
                                    { label: 'You', data: s.byLeague.map(l => l.userCount > 0 ? +(l.userRate * 100).toFixed(1) : 0), backgroundColor: '#A2845E', borderRadius: 5, barPercentage: 0.65 },
                                ],
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: legendOpts }, scales: { y: yOpts, x: xOpts } },
                        });
                    }

                    // Time line chart
                    const tc = document.querySelector(`[id^="timeChart-"]`);
                    if (tc) {
                        if (this._timeChart) this._timeChart.destroy();

                        // User cumulative
                        const uByDate = {};
                        for (const row of s.log) {
                            if (row.userRes) {
                                if (!uByDate[row.date]) uByDate[row.date] = { t: 0, c: 0 };
                                uByDate[row.date].t++;
                                if (row.userRes !== 'miss') uByDate[row.date].c++;
                            }
                        }
                        let uT = 0, uC = 0;
                        const userCum = s.byDate.map(d => {
                            const ud = uByDate[d.date]; if (ud) { uT += ud.t; uC += ud.c; }
                            return uT > 0 ? +(uC/uT*100).toFixed(1) : null;
                        });

                        this._timeChart = new Chart(tc, {
                            type: 'line',
                            data: {
                                labels: s.byDate.map(d => d.date.slice(5)),
                                datasets: [
                                    { label: 'AI', data: s.byDate.map(d => +d.cumRate.toFixed(1)), borderColor: 'rgba(0,122,255,0.7)', backgroundColor: 'rgba(0,122,255,0.04)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: 'rgba(0,122,255,0.7)', borderWidth: 2 },
                                    { label: 'You', data: userCum, borderColor: '#A2845E', backgroundColor: 'rgba(162,132,94,0.04)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#A2845E', borderWidth: 2, spanGaps: true },
                                ],
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: legendOpts }, scales: { y: yOpts, x: xOpts } },
                        });
                    }
                });
            },
        }
    }
    </script>
</body>
