name: Daily data refresh

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 7am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake container
        run: |
          echo "Waking Railway container..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://goalcast-production.up.railway.app/api/health --max-time 30)
          echo "Health check: HTTP $STATUS"

      - name: Wait for container startup
        run: sleep 15

      - name: Trigger refresh
        run: |
          echo "Triggering refresh..."
          RESULT=$(curl -s -X POST https://goalcast-production.up.railway.app/api/refresh --max-time 10)
          echo "Trigger response: $RESULT"

      - name: Poll until complete
        run: |
          echo "Polling refresh status..."
          for i in $(seq 1 36); do
            sleep 10
            STATUS=$(curl -s https://goalcast-production.up.railway.app/api/refresh-status --max-time 10)
            IS_REFRESHING=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('is_refreshing', True))" 2>/dev/null)
            MATCHES=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('matches_in_db', '?'))" 2>/dev/null)
            LAST=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('last_refresh', '?'))" 2>/dev/null)
            echo "  [$i/36] refreshing=$IS_REFRESHING matches=$MATCHES last=$LAST"
            if [ "$IS_REFRESHING" = "False" ]; then
              echo "Refresh complete!"
              echo "  Matches in DB: $MATCHES"
              echo "  Last refresh: $LAST"
              exit 0
            fi
          done
          echo "Refresh did not complete within 6 minutes"
          exit 1
