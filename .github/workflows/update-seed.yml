name: Update seed from production

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export seed from production
        run: |
          curl -s https://goalcast-production.up.railway.app/api/export > data/seed.json
          python3 -c "
          import json
          d = json.load(open('data/seed.json'))
          print(f'Matches:           {len(d[\"matches\"])}')
          print(f'Users:             {len(d.get(\"users\", []))}')
          print(f'Allowed emails:    {len(d.get(\"allowed_emails\", []))}')
          print(f'User predictions:  {len(d.get(\"user_predictions\", []))}')
          print(f'Exported at:       {d.get(\"exported_at\", \"?\")}')
          "

      - name: Auto-commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: auto-update seed from production"
          file_pattern: data/seed.json
